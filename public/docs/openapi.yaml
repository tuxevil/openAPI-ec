        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PaymentWrite' }
      responses:
        '200':
          description: Pago creado.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OperationResult'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/PaymentNormalized' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '502': { $ref: '#/components/responses/BadGateway' }
        '504': { $ref: '#/components/responses/GatewayTimeout' }
  /v1/payment-gateways/sales:
    post:
      tags: [PaymentGateways]
      summary: Crear cobro directo Payphone
      description: Crea un cobro directo hacia la app Payphone del cliente. Los montos se envian en centavos enteros.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PayphoneSaleWrite' }
            examples:
              nexosSale:
                summary: Cobro directo desde nexOS
                value:
                  provider: payphone
                  credentials:
                    bearerToken: payphone-production-token
                  data:
                    phoneNumber: "0999999999"
                    countryCode: "593"
                    reference: "Pago orden #12345"
                    clientTransactionId: "NEXOS-ORDER-12345"
                    amount: 11500
                    amountWithTax: 10000
                    amountWithoutTax: 0
                    tax: 1500
                    responseUrl: "https://nexos.example.com/webhooks/payphone"
      responses:
        '200':
          description: Cobro creado (estado pending).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OperationResult' }
              examples:
                pendingSale:
                  value:
                    provider: payphone
                    operation: payment-gateways.sale.create
                    externalId: "123456789"
                    status: pending
                    data:
                      transactionId: 123456789
                      clientTransactionId: NEXOS-ORDER-12345
                      reference: "Pago orden #12345"
                      amount: 11500
                      amountWithTax: 10000
                      amountWithoutTax: 0
                      tax: 1500
                      phoneNumber: "0999999999"
                      countryCode: "593"
                    providerResponse:
                      transactionId: 123456789
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '502': { $ref: '#/components/responses/BadGateway' }
        '504': { $ref: '#/components/responses/GatewayTimeout' }
  /v1/payment-gateways/links:
    post:
      tags: [PaymentGateways]
      summary: Crear link de pago Payphone
      description: Genera una URL de cobro compartible. Los montos se envian en centavos enteros.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PayphoneLinkWrite' }
            examples:
              ampLink:
                summary: Link de pago desde AMP
                value:
                  provider: payphone
                  credentials:
                    bearerToken: payphone-production-token
                  data:
                    reference: "Pago orden #12345"
                    clientTransactionId: "AMP-ORDER-12345"
                    amount: 11500
                    amountWithTax: 10000
                    amountWithoutTax: 0
                    tax: 1500
                    notifyUrl: "https://amp.example.com/webhooks/payphone"
      responses:
        '200':
          description: Link creado (estado pending).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OperationResult' }
              examples:
                pendingLink:
                  value:
                    provider: payphone
                    operation: payment-gateways.link.create
                    externalId: "AMP-ORDER-12345"
                    status: pending
                    data:
                      url: "https://payp.hn/x/ejemplo123"
                      clientTransactionId: AMP-ORDER-12345
                      reference: "Pago orden #12345"
                      amount: 11500
                      amountWithTax: 10000
                      amountWithoutTax: 0
                      tax: 1500
                      notifyUrl: "https://amp.example.com/webhooks/payphone"
                    providerResponse:
                      url: "https://payp.hn/x/ejemplo123"
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '502': { $ref: '#/components/responses/BadGateway' }
        '504': { $ref: '#/components/responses/GatewayTimeout' }
  /v1/payment-gateways/transactions/{transactionId}:
    get:
      tags: [PaymentGateways]
      summary: Consultar transaccion Payphone
      description: Devuelve el estado actual del cobro y normaliza Approved, Pending, Canceled y Rejected.
      parameters:
        - name: transactionId
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/GatewayProvider'
        - $ref: '#/components/parameters/GatewayBearer'
      responses:
        '200':
          description: Estado de la transaccion.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OperationResult' }
              examples:
                approvedTransaction:
                  value:
                    provider: payphone
                    operation: payment-gateways.transaction.get
                    externalId: "123456789"
                    status: success
                    data:
                      transactionId: 123456789
                      clientTransactionId: NEXOS-ORDER-12345
                      transactionStatus: Approved
                      amount: 11500
                      currency: USD
                      authorizationCode: "AUTH-001"
                      message: "Approved"
                      date: "2026-05-18T15:30:00Z"
                    providerResponse:
                      transactionId: 123456789
                      clientTransactionId: NEXOS-ORDER-12345
                      transactionStatus: Approved
                      amount: 11500
                      currency: USD
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '502': { $ref: '#/components/responses/BadGateway' }
        '504': { $ref: '#/components/responses/GatewayTimeout' }
  /v1/payment-gateways/reversals:
    post:
      tags: [PaymentGateways]
      summary: Reversar transaccion Payphone
      description: Solicita el reverso total de una transaccion previamente procesada.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PayphoneReverseWrite' }
            examples:
              nanoReverse:
                summary: Reverso desde nano
                value:
                  provider: payphone
                  credentials:
                    bearerToken: payphone-production-token
                  data:
                    transactionId: 123456789
                    clientTransactionId: "NANO-ORDER-12345"
      responses:
        '200':
          description: Reverso procesado.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OperationResult' }
              examples:
                successfulReverse:
                  value:
                    provider: payphone
                    operation: payment-gateways.reversal.create
                    externalId: "123456789"
                    status: success
                    data:
                      transactionId: 123456789
                      clientTransactionId: NANO-ORDER-12345
                      status: Success
                      message: "Transaccion reversada exitosamente"
                    providerResponse:
                      status: Success
                      message: "Transaccion reversada exitosamente"
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '502': { $ref: '#/components/responses/BadGateway' }
        '504': { $ref: '#/components/responses/GatewayTimeout' }
  /docs/openapi.yaml:
    get:
      tags: [Docs]
      security: []
      responses:
        '200':
          description: Spec OpenAPI en formato YAML.
          content:
            application/yaml:
              schema: { type: string }
  /docs:
    get:
      tags: [Docs]
      security: []
      responses:
        '200':
          description: UI Swagger.
          content:
            text/html:
              schema: { type: string }
