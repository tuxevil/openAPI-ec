openapi: 3.1.0
info:
  title: openapi-ec
  version: 1.0.0
  description: API normalizada para integraciones internas con Contifico y Payphone.
servers:
  - url: http://localhost:8081/api
tags:
  - name: Accounting
    description: Operaciones contables contra Contifico.
  - name: PaymentGateways
    description: Operaciones de pago contra Payphone.
  - name: Docs
    description: Documentacion OpenAPI y Swagger UI.
components:
  securitySchemes:
    InternalBearer:
      type: http
      scheme: bearer
  parameters:
    Provider:
      name: provider
      in: query
      required: true
      schema:
        type: string
        enum: [contifico]
    ProviderApiKey:
      name: X-Provider-Api-Key
      in: header
      required: true
      schema:
        type: string
    ProviderPosToken:
      name: X-Provider-Pos-Token
      in: header
      required: false
      schema:
        type: string
    GatewayProvider:
      name: provider
      in: query
      required: true
      schema:
        type: string
        enum: [payphone]
    GatewayBearer:
      name: X-Gateway-Bearer
      in: header
      required: true
      schema:
        type: string
  responses:
    Unauthorized:
      description: Bearer token interno invalido o ausente.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    UnprocessableEntity:
      description: Request valido pero el proveedor rechazo los datos.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    ValidationError:
      description: Errores de validacion del request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationError'
    BadGateway:
      description: El proveedor upstream devolvio 5xx.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    GatewayTimeout:
      description: Timeout al comunicarse con el proveedor.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    InternalError:
      description: Error interno del servicio.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
  schemas:
    ApiError:
      type: object
      required: [code, message, details, provider]
      properties:
        code:
          type: string
          description: Codigo de error legible por maquina.
          enum:
            - invalid_internal_token
            - provider_not_supported
            - provider_credentials_invalid
            - provider_request_error
            - provider_upstream_error
            - provider_timeout
            - internal_error
        message:
          type: string
        details:
          type: object
          additionalProperties: true
        provider:
          type: [string, 'null']
    ValidationError:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
    Identification:
      type: object
      required: [type, value]
      properties:
        type: { type: string, enum: [CEDULA, RUC, PASAPORTE, CONSUMIDOR_FINAL] }
        value: { type: string }
    OperationResult:
      type: object
      properties:
        provider: { type: string }
        operation: { type: string }
        externalId: { type: [string, 'null'] }
        status: { type: string }
        data: { type: object, additionalProperties: true }
        providerResponse: { type: object, additionalProperties: true }
    ProviderCredentials:
      type: object
      required: [apiKey]
      properties:
        apiKey: { type: string }
        posToken: { type: [string, 'null'] }
    GatewayCredentials:
      type: object
      required: [bearerToken]
      properties:
        bearerToken: { type: string }
    ContactData:
      type: object
      required: [name, identification, isCustomer, isSupplier, status]
      properties:
        name: { type: string, maxLength: 300 }
        commercialName: { type: [string, 'null'], maxLength: 300 }
        identification:
          $ref: '#/components/schemas/Identification'
        email: { type: [string, 'null'], format: email }
        phone: { type: [string, 'null'], maxLength: 50 }
        address: { type: [string, 'null'], maxLength: 300 }
        isCustomer: { type: boolean }
        isSupplier: { type: boolean }
        status: { type: string, enum: [A, I] }
    ContactWrite:
      type: object
      required: [provider, credentials, data]
      properties:
        provider: { type: string, enum: [contifico] }
        credentials:
          allOf:
            - $ref: '#/components/schemas/ProviderCredentials'
        data:
          $ref: '#/components/schemas/ContactData'
    ContactNormalized:
      type: object
      properties:
        externalId: { type: string }
        name: { type: string }
        commercialName: { type: [string, 'null'] }
        identification:
          $ref: '#/components/schemas/Identification'
        email: { type: [string, 'null'] }
        phone: { type: [string, 'null'] }
        address: { type: [string, 'null'] }
        isCustomer: { type: boolean }
        isSupplier: { type: boolean }
        status: { type: string, enum: [A, I] }
    ProductData:
      type: object
      required: [code, name, type, price, taxRate, status]
      properties:
        code: { type: string, maxLength: 200 }
        name: { type: string, maxLength: 300 }
        type: { type: string, enum: [PRO, SER] }
        price: { type: number, minimum: 0 }
        taxRate: { type: number, minimum: 0 }
        stock: { type: [number, 'null'], minimum: 0 }
        status: { type: string, enum: [A, I] }
    ProductWrite:
      type: object
      required: [provider, credentials, data]
      properties:
        provider: { type: string, enum: [contifico] }
        credentials:
          $ref: '#/components/schemas/ProviderCredentials'
        data:
          $ref: '#/components/schemas/ProductData'
    ProductNormalized:
      type: object
      properties:
        externalId: { type: string }
        code: { type: [string, 'null'] }
        name: { type: string }
        type: { type: string }
        price: { type: number }
        taxRate: { type: number }
        stock: { type: [number, 'null'] }
        status: { type: string }
    InvoiceItem:
      type: object
      required: [productExternalId, quantity, unitPrice, taxRate, discountPercentage]
      properties:
        productExternalId: { type: string }
        quantity: { type: number, exclusiveMinimum: 0 }
        unitPrice: { type: number, minimum: 0 }
        taxRate: { type: number, minimum: 0 }
        discountPercentage: { type: number, minimum: 0 }
    InvoiceCustomer:
      type: object
      required: [name, identification]
      properties:
        name: { type: string, maxLength: 300 }
        email: { type: [string, 'null'], format: email }
        phone: { type: [string, 'null'] }
        address: { type: [string, 'null'] }
        identification:
          $ref: '#/components/schemas/Identification'
    InvoiceData:
      type: object
      required: [number, issuedAt, customer, items]
      properties:
        number: { type: string, maxLength: 17 }
        issuedAt: { type: string, format: date }
        authorization: { type: [string, 'null'], maxLength: 49 }
        description: { type: [string, 'null'] }
        reference: { type: [string, 'null'], maxLength: 300 }
        status: { type: [string, 'null'] }
        customer:
          $ref: '#/components/schemas/InvoiceCustomer'
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/InvoiceItem'
    InvoiceWrite:
      type: object
      required: [provider, credentials, data]
      properties:
        provider: { type: string, enum: [contifico] }
        credentials:
          $ref: '#/components/schemas/ProviderCredentials'
        data:
          $ref: '#/components/schemas/InvoiceData'
    InvoiceNormalized:
      type: object
      properties:
        externalId: { type: string }
        number: { type: [string, 'null'] }
        issuedAt: { type: [string, 'null'], format: date }
        customer:
          type: object
          properties:
            name: { type: [string, 'null'] }
            identification:
              $ref: '#/components/schemas/Identification'
        items:
          type: array
          items: { $ref: '#/components/schemas/InvoiceItem' }
        subtotal: { type: number }
        taxTotal: { type: number }
        total: { type: number }
        status: { type: [string, 'null'] }
        authorization: { type: [string, 'null'] }
    InvoiceStatusNormalized:
      type: object
      properties:
        externalId: { type: string }
        status: { type: [string, 'null'] }
    PaymentData:
      type: object
      required: [method, amount]
      properties:
        method: { type: string, enum: [EF, CQ, TC, TRA] }
        amount: { type: number, exclusiveMinimum: 0 }
        paidAt: { type: [string, 'null'], format: date }
        reference: { type: [string, 'null'], maxLength: 15 }
        bankAccountId: { type: [string, 'null'], maxLength: 16 }
        checkNumber: { type: [string, 'null'], maxLength: 15 }
        cardProcessor: { type: [string, 'null'], enum: [D, M, E, P, A] }
    PaymentWrite:
      type: object
      required: [provider, credentials, data]
      properties:
        provider: { type: string, enum: [contifico] }
        credentials:
          $ref: '#/components/schemas/ProviderCredentials'
        data:
          $ref: '#/components/schemas/PaymentData'
    PaymentNormalized:
      type: object
      properties:
        externalId: { type: string }
        invoiceExternalId: { type: string }
        method: { type: [string, 'null'] }
        amount: { type: number }
        paidAt: { type: [string, 'null'], format: date }
        reference: { type: [string, 'null'] }
        bankAccountId: { type: [string, 'null'] }
    PayphoneSaleData:
      type: object
      required: [phoneNumber, countryCode, reference, clientTransactionId, amount, amountWithTax, amountWithoutTax, tax]
      properties:
        phoneNumber: { type: string, maxLength: 20 }
        countryCode: { type: string, maxLength: 5 }
        clientUserId: { type: [string, 'null'], maxLength: 255 }
        documentId: { type: [string, 'null'], maxLength: 20 }
        email: { type: [string, 'null'], format: email }
        reference: { type: string, maxLength: 255 }
        responseUrl: { type: [string, 'null'], format: uri }
        amount: { type: integer, minimum: 0 }
        amountWithTax: { type: integer, minimum: 0 }
        amountWithoutTax: { type: integer, minimum: 0 }
        tax: { type: integer, minimum: 0 }
        clientTransactionId: { type: string, maxLength: 255 }
        storeId: { type: [string, 'null'], format: uuid }
        terminalId: { type: [string, 'null'], maxLength: 255 }
    PayphoneSaleWrite:
      type: object
      required: [provider, credentials, data]
      properties:
        provider: { type: string, enum: [payphone] }
        credentials:
          $ref: '#/components/schemas/GatewayCredentials'
        data:
          $ref: '#/components/schemas/PayphoneSaleData'
    PayphoneLinkData:
      type: object
      required: [reference, clientTransactionId, amount, amountWithTax, amountWithoutTax, tax]
      properties:
        reference: { type: string, maxLength: 255 }
        clientTransactionId: { type: string, maxLength: 255 }
        amount: { type: integer, minimum: 0 }
        amountWithTax: { type: integer, minimum: 0 }
        amountWithoutTax: { type: integer, minimum: 0 }
        tax: { type: integer, minimum: 0 }
        expireIn: { type: [integer, 'null'], minimum: 1 }
        notifyUrl: { type: [string, 'null'], format: uri }
        storeId: { type: [string, 'null'], format: uuid }
        terminalId: { type: [string, 'null'], maxLength: 255 }
        documentId: { type: [string, 'null'], maxLength: 20 }
        email: { type: [string, 'null'], format: email }
    PayphoneLinkWrite:
      type: object
      required: [provider, credentials, data]
      properties:
        provider: { type: string, enum: [payphone] }
        credentials:
          $ref: '#/components/schemas/GatewayCredentials'
        data:
          $ref: '#/components/schemas/PayphoneLinkData'
    PayphoneReverseData:
      type: object
      required: [transactionId, clientTransactionId]
      properties:
        transactionId: { type: integer, minimum: 1 }
        clientTransactionId: { type: string, maxLength: 255 }
    PayphoneReverseWrite:
      type: object
      required: [provider, credentials, data]
      properties:
        provider: { type: string, enum: [payphone] }
        credentials:
          $ref: '#/components/schemas/GatewayCredentials'
        data:
          $ref: '#/components/schemas/PayphoneReverseData'
paths:
  /v1/contacts:
    get:
      tags: [Accounting]
      parameters:
        - $ref: '#/components/parameters/Provider'
        - $ref: '#/components/parameters/ProviderApiKey'
        - $ref: '#/components/parameters/ProviderPosToken'
        - name: search
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string, enum: [A, I] }
        - name: type
          in: query
          schema: { type: string, enum: [N, J, I, P] }
        - name: page
          in: query
          schema: { type: integer, minimum: 1 }
      responses:
        '200':
          description: Lista de contactos normalizados.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OperationResult'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items: { $ref: '#/components/schemas/ContactNormalized' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '502': { $ref: '#/components/responses/BadGateway' }
        '504': { $ref: '#/components/responses/GatewayTimeout' }
    post:
      tags: [Accounting]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContactWrite' }
      responses:
        '200':
          description: Contacto creado.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OperationResult'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/ContactNormalized' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '502': { $ref: '#/components/responses/BadGateway' }
        '504': { $ref: '#/components/responses/GatewayTimeout' }
  /v1/contacts/{id}:
    get:
      tags: [Accounting]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/Provider'
        - $ref: '#/components/parameters/ProviderApiKey'
      responses:
        '200':
          description: Detalle del contacto.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OperationResult'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/ContactNormalized' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '502': { $ref: '#/components/responses/BadGateway' }
        '504': { $ref: '#/components/responses/GatewayTimeout' }
    put:
      tags: [Accounting]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContactWrite' }
      responses:
        '200':
          description: Contacto actualizado.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OperationResult'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/ContactNormalized' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '502': { $ref: '#/components/responses/BadGateway' }
        '504': { $ref: '#/components/responses/GatewayTimeout' }
  /v1/products:
    get:
      tags: [Accounting]
      parameters:
        - $ref: '#/components/parameters/Provider'
        - $ref: '#/components/parameters/ProviderApiKey'
        - name: search
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string, enum: [A, I] }
        - name: page
          in: query
          schema: { type: integer, minimum: 1 }
      responses:
        '200':
          description: Lista de productos normalizados.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OperationResult'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items: { $ref: '#/components/schemas/ProductNormalized' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '502': { $ref: '#/components/responses/BadGateway' }
        '504': { $ref: '#/components/responses/GatewayTimeout' }
    post:
      tags: [Accounting]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductWrite' }
      responses:
        '200':
          description: Producto creado.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OperationResult'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/ProductNormalized' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '502': { $ref: '#/components/responses/BadGateway' }
        '504': { $ref: '#/components/responses/GatewayTimeout' }
  /v1/products/{id}:
    get:
      tags: [Accounting]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/Provider'
        - $ref: '#/components/parameters/ProviderApiKey'
      responses:
        '200':
          description: Detalle del producto.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OperationResult'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/ProductNormalized' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '502': { $ref: '#/components/responses/BadGateway' }
        '504': { $ref: '#/components/responses/GatewayTimeout' }
    put:
      tags: [Accounting]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductWrite' }
      responses:
        '200':
          description: Producto actualizado.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OperationResult'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/ProductNormalized' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '502': { $ref: '#/components/responses/BadGateway' }
        '504': { $ref: '#/components/responses/GatewayTimeout' }
  /v1/products/{id}/stock:
    get:
      tags: [Accounting]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/Provider'
        - $ref: '#/components/parameters/ProviderApiKey'
      responses:
        '200':
          description: Stock por bodega.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OperationResult'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              type: object
                              properties:
                                warehouseId: { type: [string, 'null'] }
                                warehouseName: { type: [string, 'null'] }
                                quantity: { type: number }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '502': { $ref: '#/components/responses/BadGateway' }
        '504': { $ref: '#/components/responses/GatewayTimeout' }
  /v1/invoices:
    get:
      tags: [Accounting]
      parameters:
        - $ref: '#/components/parameters/Provider'
        - $ref: '#/components/parameters/ProviderApiKey'
        - name: customerIdentification
          in: query
          schema: { type: string }
        - name: issuedFrom
          in: query
          schema: { type: string, format: date }
        - name: issuedTo
          in: query
          schema: { type: string, format: date }
        - name: page
          in: query
          schema: { type: integer, minimum: 1 }
      responses:
        '200':
          description: Lista de facturas normalizadas.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OperationResult'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items: { $ref: '#/components/schemas/InvoiceNormalized' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '502': { $ref: '#/components/responses/BadGateway' }
        '504': { $ref: '#/components/responses/GatewayTimeout' }
    post:
      tags: [Accounting]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InvoiceWrite' }
      responses:
        '200':
          description: Factura creada.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OperationResult'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/InvoiceNormalized' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '502': { $ref: '#/components/responses/BadGateway' }
        '504': { $ref: '#/components/responses/GatewayTimeout' }
  /v1/invoices/{id}:
    get:
      tags: [Accounting]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/Provider'
        - $ref: '#/components/parameters/ProviderApiKey'
      responses:
        '200':
          description: Detalle de la factura.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OperationResult'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/InvoiceNormalized' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '502': { $ref: '#/components/responses/BadGateway' }
        '504': { $ref: '#/components/responses/GatewayTimeout' }
  /v1/invoices/{id}/status:
    get:
      tags: [Accounting]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/Provider'
        - $ref: '#/components/parameters/ProviderApiKey'
      responses:
        '200':
          description: Estado actual de la factura.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OperationResult'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/InvoiceStatusNormalized' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '502': { $ref: '#/components/responses/BadGateway' }
        '504': { $ref: '#/components/responses/GatewayTimeout' }
  /v1/invoices/{invoiceId}/payments:
    get:
      tags: [Accounting]
      parameters:
        - name: invoiceId
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/Provider'
        - $ref: '#/components/parameters/ProviderApiKey'
      responses:
        '200':
          description: Pagos contables de la factura.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OperationResult'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items: { $ref: '#/components/schemas/PaymentNormalized' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '502': { $ref: '#/components/responses/BadGateway' }
        '504': { $ref: '#/components/responses/GatewayTimeout' }
    post:
      tags: [Accounting]
      parameters:
        - name: invoiceId
          in: path
          required: true
          schema: { type: string }
