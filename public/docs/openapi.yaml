openapi: 3.1.0
info:
  title: openapi-ec
  version: 1.0.0
  description: API normalizada para integraciones internas con Contifico y Payphone.
servers:
  - url: http://localhost:8081/api
components:
  securitySchemes:
    InternalBearer:
      type: http
      scheme: bearer
  parameters:
    Provider:
      name: provider
      in: query
      required: true
      schema:
        type: string
        enum: [contifico]
    ProviderApiKey:
      name: X-Provider-Api-Key
      in: header
      required: true
      schema:
        type: string
    ProviderPosToken:
      name: X-Provider-Pos-Token
      in: header
      required: false
      schema:
        type: string
    GatewayProvider:
      name: provider
      in: query
      required: true
      schema:
        type: string
        enum: [payphone]
    GatewayBearer:
      name: X-Gateway-Bearer
      in: header
      required: true
      schema:
        type: string
  schemas:
    OperationResult:
      type: object
      properties:
        provider: { type: string }
        operation: { type: string }
        externalId: { type: [string, 'null'] }
        status: { type: string }
        data: { type: object, additionalProperties: true }
        providerResponse: { type: object, additionalProperties: true }
    ProviderCredentials:
      type: object
      required: [apiKey]
      properties:
        apiKey: { type: string }
        posToken: { type: [string, 'null'] }
    GatewayCredentials:
      type: object
      required: [bearerToken]
      properties:
        bearerToken: { type: string }
    ContactWrite:
      type: object
      required: [provider, credentials, data]
      properties:
        provider: { type: string, enum: [contifico] }
        credentials:
          $ref: '#/components/schemas/ProviderCredentials'
        data:
          type: object
          required: [name, identification]
          properties:
            name: { type: string }
            commercialName: { type: [string, 'null'] }
            identification:
              type: object
              required: [type, value]
              properties:
                type: { type: string, enum: [CEDULA, RUC, PASAPORTE, CONSUMIDOR_FINAL] }
                value: { type: string }
            email: { type: [string, 'null'] }
            phone: { type: [string, 'null'] }
            address: { type: [string, 'null'] }
            isCustomer: { type: boolean }
            isSupplier: { type: boolean }
            status: { type: string, enum: [A, I] }
    ProductWrite:
      type: object
      required: [provider, credentials, data]
      properties:
        provider: { type: string, enum: [contifico] }
        credentials:
          $ref: '#/components/schemas/ProviderCredentials'
        data:
          type: object
          required: [code, name, type, price]
          properties:
            code: { type: string }
            name: { type: string }
            type: { type: string, enum: [PRO, SER] }
            price: { type: number }
            taxRate: { type: number }
            stock: { type: number }
            status: { type: string, enum: [A, I] }
    InvoiceWrite:
      type: object
      required: [provider, credentials, data]
      properties:
        provider: { type: string, enum: [contifico] }
        credentials:
          $ref: '#/components/schemas/ProviderCredentials'
        data:
          type: object
          required: [number, issuedAt, customer, items]
          properties:
            number: { type: string }
            issuedAt: { type: string, format: date }
            authorization: { type: [string, 'null'] }
            description: { type: [string, 'null'] }
            reference: { type: [string, 'null'] }
            status: { type: string }
            customer:
              type: object
              required: [name, identification]
              properties:
                name: { type: string }
                email: { type: [string, 'null'] }
                phone: { type: [string, 'null'] }
                address: { type: [string, 'null'] }
                identification:
                  type: object
                  required: [type, value]
                  properties:
                    type: { type: string, enum: [CEDULA, RUC, PASAPORTE, CONSUMIDOR_FINAL] }
                    value: { type: string }
            items:
              type: array
              items:
                type: object
                required: [productExternalId, quantity, unitPrice]
                properties:
                  productExternalId: { type: string }
                  quantity: { type: number }
                  unitPrice: { type: number }
                  taxRate: { type: number }
                  discountPercentage: { type: number }
    PaymentWrite:
      type: object
      required: [provider, credentials, data]
      properties:
        provider: { type: string, enum: [contifico] }
        credentials:
          $ref: '#/components/schemas/ProviderCredentials'
        data:
          type: object
          required: [method, amount]
          properties:
            method: { type: string, enum: [EF, CQ, TC, TRA] }
            amount: { type: number }
            paidAt: { type: [string, 'null'], format: date }
            reference: { type: [string, 'null'] }
            bankAccountId: { type: [string, 'null'] }
            checkNumber: { type: [string, 'null'] }
            cardProcessor: { type: [string, 'null'], enum: [D, M, E, P, A] }
    PayphoneSaleWrite:
      type: object
      required: [provider, credentials, data]
      properties:
        provider: { type: string, enum: [payphone] }
        credentials:
          $ref: '#/components/schemas/GatewayCredentials'
        data:
          type: object
          required: [phoneNumber, countryCode, reference, clientTransactionId, amount, amountWithTax, amountWithoutTax, tax]
          properties:
            phoneNumber: { type: string }
            countryCode: { type: string }
            clientUserId: { type: [string, 'null'] }
            documentId: { type: [string, 'null'] }
            email: { type: [string, 'null'], format: email }
            reference: { type: string }
            responseUrl: { type: [string, 'null'], format: uri }
            amount: { type: integer }
            amountWithTax: { type: integer }
            amountWithoutTax: { type: integer }
            tax: { type: integer }
            clientTransactionId: { type: string }
            storeId: { type: [string, 'null'], format: uuid }
            terminalId: { type: [string, 'null'] }
    PayphoneLinkWrite:
      type: object
      required: [provider, credentials, data]
      properties:
        provider: { type: string, enum: [payphone] }
        credentials:
          $ref: '#/components/schemas/GatewayCredentials'
        data:
          type: object
          required: [reference, clientTransactionId, amount, amountWithTax, amountWithoutTax, tax]
          properties:
            reference: { type: string }
            clientTransactionId: { type: string }
            amount: { type: integer }
            amountWithTax: { type: integer }
            amountWithoutTax: { type: integer }
            tax: { type: integer }
            expireIn: { type: [integer, 'null'] }
            notifyUrl: { type: [string, 'null'], format: uri }
            storeId: { type: [string, 'null'], format: uuid }
            terminalId: { type: [string, 'null'] }
            documentId: { type: [string, 'null'] }
            email: { type: [string, 'null'], format: email }
    PayphoneReverseWrite:
      type: object
      required: [provider, credentials, data]
      properties:
        provider: { type: string, enum: [payphone] }
        credentials:
          $ref: '#/components/schemas/GatewayCredentials'
        data:
          type: object
          required: [transactionId, clientTransactionId]
          properties:
            transactionId: { type: integer }
            clientTransactionId: { type: string }
security:
  - InternalBearer: []
paths:
  /v1/contacts:
    get:
      parameters:
        - $ref: '#/components/parameters/Provider'
        - $ref: '#/components/parameters/ProviderApiKey'
        - $ref: '#/components/parameters/ProviderPosToken'
      responses:
        '200':
          description: Contact list
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactWrite'
      responses:
        '200':
          description: Contact created
  /v1/contacts/{id}:
    get:
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/Provider'
        - $ref: '#/components/parameters/ProviderApiKey'
      responses:
        '200': { description: Contact detail }
    put:
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactWrite'
      responses:
        '200': { description: Contact updated }
  /v1/products:
    get:
      parameters:
        - $ref: '#/components/parameters/Provider'
        - $ref: '#/components/parameters/ProviderApiKey'
      responses:
        '200': { description: Product list }
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductWrite'
      responses:
        '200': { description: Product created }
  /v1/products/{id}:
    get:
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/Provider'
        - $ref: '#/components/parameters/ProviderApiKey'
      responses:
        '200': { description: Product detail }
    put:
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductWrite'
      responses:
        '200': { description: Product updated }
  /v1/products/{id}/stock:
    get:
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/Provider'
        - $ref: '#/components/parameters/ProviderApiKey'
      responses:
        '200': { description: Product stock }
  /v1/invoices:
    get:
      parameters:
        - $ref: '#/components/parameters/Provider'
        - $ref: '#/components/parameters/ProviderApiKey'
      responses:
        '200': { description: Invoice list }
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvoiceWrite'
      responses:
        '200': { description: Invoice created }
  /v1/invoices/{id}:
    get:
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/Provider'
        - $ref: '#/components/parameters/ProviderApiKey'
      responses:
        '200': { description: Invoice detail }
  /v1/invoices/{id}/status:
    get:
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/Provider'
        - $ref: '#/components/parameters/ProviderApiKey'
      responses:
        '200': { description: Invoice status }
  /v1/invoices/{invoiceId}/payments:
    get:
      parameters:
        - name: invoiceId
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/Provider'
        - $ref: '#/components/parameters/ProviderApiKey'
      responses:
        '200': { description: Invoice payments }
    post:
      parameters:
        - name: invoiceId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentWrite'
      responses:
        '200': { description: Payment created }
  /v1/payment-gateways/sales:
    post:
      summary: Crear cobro directo Payphone
      description: Crea un cobro directo hacia la app Payphone del cliente. Los montos se envian en centavos enteros.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PayphoneSaleWrite'
            examples:
              nexosSale:
                summary: Cobro directo desde nexOS
                value:
                  provider: payphone
                  credentials:
                    bearerToken: payphone-production-token
                  data:
                    phoneNumber: "0999999999"
                    countryCode: "593"
                    reference: "Pago orden #12345"
                    clientTransactionId: "NEXOS-ORDER-12345"
                    amount: 11500
                    amountWithTax: 10000
                    amountWithoutTax: 0
                    tax: 1500
                    responseUrl: "https://nexos.example.com/webhooks/payphone"
      responses:
        '200':
          description: Payphone sale created
          content:
            application/json:
              examples:
                pendingSale:
                  value:
                    provider: payphone
                    operation: payment-gateways.sale.create
                    externalId: "123456789"
                    status: pending
                    data:
                      transactionId: 123456789
                      clientTransactionId: NEXOS-ORDER-12345
                      reference: "Pago orden #12345"
                      amount: 11500
                      amountWithTax: 10000
                      amountWithoutTax: 0
                      tax: 1500
                      phoneNumber: "0999999999"
                      countryCode: "593"
                    providerResponse:
                      transactionId: 123456789
  /v1/payment-gateways/links:
    post:
      summary: Crear link de pago Payphone
      description: Genera una URL de cobro compartible. Los montos se envian en centavos enteros.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PayphoneLinkWrite'
            examples:
              ampLink:
                summary: Link de pago desde AMP
                value:
                  provider: payphone
                  credentials:
                    bearerToken: payphone-production-token
                  data:
                    reference: "Pago orden #12345"
                    clientTransactionId: "AMP-ORDER-12345"
                    amount: 11500
                    amountWithTax: 10000
                    amountWithoutTax: 0
                    tax: 1500
                    notifyUrl: "https://amp.example.com/webhooks/payphone"
      responses:
        '200':
          description: Payphone payment link created
          content:
            application/json:
              examples:
                pendingLink:
                  value:
                    provider: payphone
                    operation: payment-gateways.link.create
                    externalId: "AMP-ORDER-12345"
                    status: pending
                    data:
                      url: "https://payp.hn/x/ejemplo123"
                      clientTransactionId: AMP-ORDER-12345
                      reference: "Pago orden #12345"
                      amount: 11500
                      amountWithTax: 10000
                      amountWithoutTax: 0
                      tax: 1500
                      notifyUrl: "https://amp.example.com/webhooks/payphone"
                    providerResponse:
                      url: "https://payp.hn/x/ejemplo123"
  /v1/payment-gateways/transactions/{transactionId}:
    get:
      summary: Consultar transaccion Payphone
      description: Devuelve el estado actual del cobro y normaliza Approved, Pending, Canceled y Rejected.
      parameters:
        - name: transactionId
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/GatewayProvider'
        - $ref: '#/components/parameters/GatewayBearer'
      responses:
        '200':
          description: Payphone transaction status
          content:
            application/json:
              examples:
                approvedTransaction:
                  value:
                    provider: payphone
                    operation: payment-gateways.transaction.get
                    externalId: "123456789"
                    status: success
                    data:
                      transactionId: 123456789
                      clientTransactionId: NEXOS-ORDER-12345
                      transactionStatus: Approved
                      amount: 11500
                      currency: USD
                      authorizationCode: "AUTH-001"
                      message: "Approved"
                      date: "2026-05-18T15:30:00Z"
                    providerResponse:
                      transactionId: 123456789
                      clientTransactionId: NEXOS-ORDER-12345
                      transactionStatus: Approved
                      amount: 11500
                      currency: USD
  /v1/payment-gateways/reversals:
    post:
      summary: Reversar transaccion Payphone
      description: Solicita el reverso total de una transaccion previamente procesada.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PayphoneReverseWrite'
            examples:
              nanoReverse:
                summary: Reverso desde nano
                value:
                  provider: payphone
                  credentials:
                    bearerToken: payphone-production-token
                  data:
                    transactionId: 123456789
                    clientTransactionId: "NANO-ORDER-12345"
      responses:
        '200':
          description: Payphone reversal created
          content:
            application/json:
              examples:
                successfulReverse:
                  value:
                    provider: payphone
                    operation: payment-gateways.reversal.create
                    externalId: "123456789"
                    status: success
                    data:
                      transactionId: 123456789
                      clientTransactionId: NANO-ORDER-12345
                      status: Success
                      message: "Transaccion reversada exitosamente"
                    providerResponse:
                      status: Success
                      message: "Transaccion reversada exitosamente"
