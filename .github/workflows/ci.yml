name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, tests y auditoria
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: bcmath, curl, intl, mbstring, pdo_sqlite, sqlite3
          coverage: none
          tools: composer:v2

      - name: Cache de dependencias
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-php-8.4-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-php-8.4-

      - name: Instalar dependencias
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Preparar entorno
        run: |
          cp .env.example .env
          php artisan key:generate --ansi

      - name: Estilo de codigo (Pint)
        run: ./vendor/bin/pint --test

      - name: Pruebas (PHPUnit)
        run: php artisan test

      - name: Auditoria de seguridad (composer audit)
        run: composer audit
